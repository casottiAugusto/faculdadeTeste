<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js"></script>
  </head>
  <body>
    <div class="calculator">
      <div class="display">
        <div class="prev-calc">1,234 × 2</div>
        <div class="current-calc">2,468</div>
      </div>

      <div class="buttons">
        <button class="btn-action">C</button>
        <button class="btn-action">+/-</button>
        <button class="btn-action">%</button>
        <button class="btn-op">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="btn-op">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="btn-op">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="btn-op">+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="btn-op">=</button>
      </div>
    </div>
  </body>
</html>
